<!DOCTYPE html>
<html lang="fr" id="htmlRoot">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Crypto Oracle">
<meta name="theme-color" content="#060810">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="manifest.json">
<title id="pageTitle">CRYPTO ORACLE v2 — Pépites x10 · Top 500→50</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --gold:#f5c518;--gold-dim:#a88a10;--amber:#ff8c00;
  --green:#00ff9d;--red:#ff3b5c;--blue:#00c8ff;--purple:#bd93f9;
  --orange:#ff6b35;
  --bg:#060810;--bg2:#0c1020;--bg3:#111827;
  --border:rgba(245,197,24,0.15);--border-bright:rgba(245,197,24,0.5);
  --text:#e0e8f0;--text-dim:#6b7a8d;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(245,197,24,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(245,197,24,0.025) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 0%,rgba(255,107,53,0.06) 0%,transparent 40%),radial-gradient(ellipse at 90% 100%,rgba(0,200,255,0.04) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{max-width:1700px;margin:0 auto;padding:0 24px;position:relative;z-index:1}

/* HEADER */
header{border-bottom:1px solid var(--border);padding:14px 0;background:rgba(6,8,16,0.97);position:sticky;top:0;z-index:100;backdrop-filter:blur(16px)}
.header-inner{display:flex;align-items:center;justify-content:space-between;max-width:1700px;margin:0 auto;padding:0 24px;flex-wrap:wrap;gap:10px}
.logo{font-family:'Orbitron',sans-serif;font-weight:900;font-size:18px;color:var(--orange);letter-spacing:3px;text-shadow:0 0 20px rgba(255,107,53,0.4)}
.logo-v{color:var(--gold);font-size:12px;vertical-align:super;margin-left:4px}
.logo span{color:var(--text-dim);font-weight:400}
.header-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.header-pills{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.pill{padding:4px 10px;border:1px solid;font-size:10px;letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.pill-fear{border-color:rgba(255,59,92,0.4);color:var(--red);background:rgba(255,59,92,0.06)}
.pill-btc{border-color:rgba(245,197,24,0.3);color:var(--gold);background:rgba(245,197,24,0.05)}
.pill-alt{border-color:rgba(0,200,255,0.3);color:var(--blue);background:rgba(0,200,255,0.05)}
.pill-alert{border-color:rgba(255,107,53,0.5);color:var(--orange);background:rgba(255,107,53,0.08);animation:alertpulse 2s infinite}
@keyframes alertpulse{0%,100%{box-shadow:none}50%{box-shadow:0 0 12px rgba(255,107,53,0.4)}}
.dot{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;display:inline-block;margin-right:5px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

/* LANG SWITCHER */
.lang-switcher{display:flex;gap:2px;background:var(--bg3);border:1px solid var(--border);padding:2px}
.lang-btn{padding:5px 10px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;background:transparent;border:none;color:var(--text-dim);transition:all 0.15s;text-transform:uppercase}
.lang-btn:hover{color:var(--text)}
.lang-btn.active{background:var(--orange);color:var(--bg);font-weight:600}

/* NOTICE */
.notice-bar{background:rgba(255,107,53,0.05);border-bottom:1px solid rgba(255,107,53,0.15);padding:7px 24px;font-size:10px;color:rgba(255,107,53,0.65);letter-spacing:1px;text-align:center}

main{padding:24px 0 60px}

/* SECTION */
.section-label{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:4px;color:var(--gold-dim);text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:12px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
.section-label .badge{font-size:9px;color:var(--orange);border:1px solid rgba(255,107,53,0.4);padding:2px 8px;background:rgba(255,107,53,0.06)}

/* MARKET BAR */
.market-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:24px}
@media(max-width:900px){.market-bar{grid-template-columns:repeat(3,1fr)}}
@media(max-width:500px){.market-bar{grid-template-columns:repeat(2,1fr)}}
.market-cell{background:var(--bg2);border:1px solid var(--border);padding:12px 14px}
.market-cell-label{font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:5px}
.market-cell-val{font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700}
.market-cell-sub{font-size:10px;color:var(--text-dim);margin-top:3px}

/* CONTROLS */
.controls-panel{background:var(--bg2);border:1px solid var(--border);padding:20px;margin-bottom:24px}
.controls-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
@media(max-width:900px){.controls-grid{grid-template-columns:repeat(2,1fr)}}
.control-item label{display:block;font-size:10px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px}
.control-item .weight-val{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;margin-bottom:5px}
.control-item .weight-desc{font-size:9px;color:var(--text-dim);letter-spacing:1px;margin-top:4px}
.w-growth{color:var(--green)}.w-community{color:var(--blue)}.w-sentiment{color:var(--orange)}.w-ath{color:var(--amber)}
input[type=range]{width:100%;appearance:none;height:3px;background:var(--border);outline:none;cursor:pointer}
input[type=range].r-growth::-webkit-slider-thumb{appearance:none;width:13px;height:13px;background:var(--green);border-radius:0;box-shadow:0 0 8px var(--green)}
input[type=range].r-community::-webkit-slider-thumb{appearance:none;width:13px;height:13px;background:var(--blue);border-radius:0;box-shadow:0 0 8px var(--blue)}
input[type=range].r-sentiment::-webkit-slider-thumb{appearance:none;width:13px;height:13px;background:var(--orange);border-radius:0;box-shadow:0 0 8px var(--orange)}
input[type=range].r-ath::-webkit-slider-thumb{appearance:none;width:13px;height:13px;background:var(--amber);border-radius:0;box-shadow:0 0 8px var(--amber)}

/* TOP 5 */
.top5-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px}
@media(max-width:1100px){.top5-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.top5-grid{grid-template-columns:1fr}}
.card{background:var(--bg2);border:1px solid var(--border);padding:20px;position:relative;transition:border-color 0.3s,box-shadow 0.3s;animation:fadeSlide 0.5s ease both}
@keyframes fadeSlide{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.card:nth-child(1){animation-delay:.05s}.card:nth-child(2){animation-delay:.1s}.card:nth-child(3){animation-delay:.15s}.card:nth-child(4){animation-delay:.2s}.card:nth-child(5){animation-delay:.25s}
.card:hover{border-color:var(--border-bright);box-shadow:0 0 24px rgba(245,197,24,0.06)}
.card.rank-1{border-color:rgba(255,107,53,0.5)}
.card.rank-1::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.card.rank-2{border-color:rgba(245,197,24,0.35)}
.card.rank-3{border-color:rgba(0,200,255,0.25)}
.alert-badge{display:inline-flex;align-items:center;gap:6px;font-size:9px;letter-spacing:2px;color:var(--orange);border:1px solid rgba(255,107,53,0.4);padding:3px 9px;background:rgba(255,107,53,0.08);margin-bottom:9px;animation:alertpulse 2s infinite}
.card-rank{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:3px;color:var(--text-dim);margin-bottom:10px}
.rank-1 .card-rank{color:var(--orange)}.rank-2 .card-rank{color:var(--gold)}.rank-3 .card-rank{color:var(--blue)}
.card-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.coin-info{display:flex;align-items:center;gap:11px}
.coin-icon{width:40px;height:40px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:12px;color:var(--gold);flex-shrink:0}
.coin-name{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px}
.coin-symbol{font-size:10px;color:var(--text-dim);letter-spacing:2px;margin-top:2px}
.coin-price{text-align:right}
.price-val{font-family:'Orbitron',sans-serif;font-size:13px}
.price-change{font-size:11px;margin-top:3px;font-weight:600}
.pos{color:var(--green)}.neg{color:var(--red)}
.total-score{display:flex;align-items:baseline;gap:5px;margin-bottom:16px}
.score-num{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:var(--orange);text-shadow:0 0 18px rgba(255,107,53,0.3);line-height:1}
.score-max{color:var(--text-dim);font-size:13px}
.score-bars{display:flex;flex-direction:column;gap:8px;margin-bottom:14px}
.bar-row{display:flex;align-items:center;gap:9px}
.bar-label{font-size:9px;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;width:75px;flex-shrink:0}
.bar-track{flex:1;height:4px;background:rgba(255,255,255,0.05)}
.bar-fill{height:100%;transition:width 1s cubic-bezier(0.16,1,0.3,1);position:relative}
.bar-fill::after{content:'';position:absolute;right:0;top:50%;transform:translate(50%,-50%);width:5px;height:5px;background:inherit;box-shadow:0 0 7px currentColor}
.bar-growth .bar-fill{background:var(--green)}.bar-community .bar-fill{background:var(--blue)}.bar-sentiment .bar-fill{background:var(--orange)}.bar-ath .bar-fill{background:var(--amber)}
.bar-score{font-size:11px;color:var(--text);width:26px;text-align:right;flex-shrink:0;font-family:'Share Tech Mono',monospace}
.metrics-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.metric{text-align:center}
.metric-val{font-family:'Share Tech Mono',monospace;font-size:12px;white-space:nowrap}
.metric-label{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;margin-top:2px}
.community-bar{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.comm-label{font-size:9px;color:var(--text-dim);letter-spacing:1px;text-transform:uppercase;white-space:nowrap}
.comm-track{flex:1;min-width:35px;height:3px;background:rgba(255,255,255,0.05)}
.comm-fill{height:100%;background:var(--blue);transition:width 1s}
.comm-val{font-size:10px;color:var(--blue);font-family:'Share Tech Mono',monospace;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:5px}
.tag{font-size:9px;letter-spacing:1.5px;padding:2px 7px;border:1px solid;text-transform:uppercase}
.tag-bull{border-color:rgba(0,255,157,0.4);color:var(--green);background:rgba(0,255,157,0.05)}
.tag-rare{border-color:rgba(245,197,24,0.4);color:var(--gold);background:rgba(245,197,24,0.05)}
.tag-social{border-color:rgba(0,200,255,0.4);color:var(--blue);background:rgba(0,200,255,0.05)}
.tag-tech{border-color:rgba(255,107,53,0.4);color:var(--orange);background:rgba(255,107,53,0.05)}

/* TABLE */
.table-filters{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.filter-btn{padding:5px 13px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1.5px;cursor:pointer;transition:all 0.2s;text-transform:uppercase}
.filter-btn:hover,.filter-btn.active{border-color:var(--orange);color:var(--orange);background:rgba(255,107,53,0.06)}
.full-table-wrap{background:var(--bg2);border:1px solid var(--border);overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--border)}
th{padding:12px 13px;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;text-align:left;font-weight:400;cursor:pointer;white-space:nowrap;transition:color 0.2s;user-select:none}
th:hover{color:var(--gold)}.sort-active{color:var(--gold)!important}
.sort-asc::after{content:" ↑"}.sort-desc::after{content:" ↓"}
tbody tr{border-bottom:1px solid rgba(245,197,24,0.04);transition:background 0.15s}
tbody tr:hover{background:rgba(245,197,24,0.03)}
tbody tr.tr-alert{border-left:2px solid rgba(255,107,53,0.5)}
td{padding:10px 13px;vertical-align:middle;white-space:nowrap}
.td-rank{color:var(--text-dim);font-size:11px}.td-top{color:var(--gold);font-weight:600}
.td-coin{display:flex;align-items:center;gap:9px}
.td-icon{width:26px;height:26px;border-radius:50%;background:var(--bg3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);border:1px solid var(--border);font-family:'Orbitron',sans-serif}
.td-name{font-weight:600;font-size:12px}.td-sym{font-size:10px;color:var(--text-dim);letter-spacing:1px}
.mini-bar{height:3px;background:rgba(255,255,255,0.05);width:65px}
.mini-fill{height:100%}
.score-badge{display:inline-block;font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:var(--orange);padding:3px 9px;border:1px solid rgba(255,107,53,0.3);background:rgba(255,107,53,0.06)}
.rsi-gauge{width:48px;height:5px;background:rgba(255,255,255,0.05)}
.rsi-fill{height:100%}
.alert-mini{font-size:11px;margin-right:3px}
.legend{display:flex;flex-wrap:wrap;gap:18px;padding:10px 0;margin-bottom:18px}
.legend-item{display:flex;align-items:center;gap:7px;font-size:10px;color:var(--text-dim);letter-spacing:1px}
.legend-dot{width:7px;height:7px}

/* ── TRACK RECORD ─────────────────────────────────────────── */
.track-record{margin-top:48px}
.tr-header{background:var(--bg2);border:1px solid var(--border);border-bottom:none;padding:24px 24px 0}
.tr-title-row{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:20px}
.tr-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:var(--gold);letter-spacing:2px}
.tr-subtitle{font-size:11px;color:var(--text-dim);margin-top:4px;letter-spacing:1px}
.tr-global-score{text-align:right}
.tr-global-val{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:var(--green);text-shadow:0 0 16px rgba(0,255,157,0.3)}
.tr-global-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.tr-tabs{display:flex;gap:0;border-bottom:1px solid var(--border)}
.tr-tab{padding:10px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:2px;cursor:pointer;background:transparent;border:none;color:var(--text-dim);border-bottom:2px solid transparent;transition:all 0.2s;text-transform:uppercase}
.tr-tab:hover{color:var(--text)}
.tr-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tr-panel{background:var(--bg2);border:1px solid var(--border);border-top:none;display:none}
.tr-panel.active{display:block}
.tr-summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border)}
.tr-summary-cell{background:var(--bg2);padding:16px 20px;text-align:center}
.tr-summary-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:700}
.tr-summary-label{font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;margin-top:4px}
.tr-storage-info{padding:12px 20px;font-size:10px;color:var(--text-dim);letter-spacing:1px;border-bottom:1px solid var(--border);background:rgba(245,197,24,0.02)}
.tr-coin-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;gap:0;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;padding:0}
@media(max-width:800px){.tr-coin-row{grid-template-columns:2fr 1fr 1fr}}
.tr-coin-row:hover{background:rgba(245,197,24,0.02)}
.tr-col{padding:13px 16px;font-size:12px}
.tr-col-header{padding:10px 16px;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border)}
.tr-coin-name{font-weight:600;font-size:13px}
.tr-coin-sym{font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-top:2px}
.tr-rank-change{font-size:11px;display:flex;align-items:center;gap:4px}
.perf-pos{color:var(--green);font-weight:600}
.perf-neg{color:var(--red);font-weight:600}
.perf-bar-wrap{display:flex;align-items:center;gap:8px}
.perf-bar{height:4px;background:rgba(255,255,255,0.05);width:60px;flex-shrink:0}
.perf-bar-fill{height:100%;transition:width 1s cubic-bezier(0.16,1,0.3,1)}
.tr-no-data{padding:40px;text-align:center;color:var(--text-dim);font-size:12px;letter-spacing:1px}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">CRYPTO <span>/</span> ORACLE<span class="logo-v">v2</span></div>
    <div class="header-right">
      <div class="header-pills">
        <span class="pill pill-fear" id="hFearGreed"></span>
        <span class="pill pill-btc" id="hBtcDom"></span>
        <span class="pill pill-alt" id="hAltSeason"></span>
        <span class="pill pill-alert" id="hAlerts">20 🚨 <span id="hAlertsLabel"></span></span>
        <span style="font-size:10px;color:var(--text-dim)"><span class="dot"></span>21 mar 2026</span>
      </div>
      <!-- LANG SWITCHER -->
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" onclick="setLang('es')">ES</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </div>
</header>

<div class="notice-bar" id="noticeBar"></div>

<main>
<div class="container">

  <div class="section-label" style="margin-top:0" id="marketTitle"></div>
  <div class="market-bar">
    <div class="market-cell"><div class="market-cell-label" id="mFearLabel"></div><div class="market-cell-val" style="color:var(--red)" id="mFearVal"></div><div class="market-cell-sub" id="mFearSub"></div></div>
    <div class="market-cell"><div class="market-cell-label" id="mBtcLabel"></div><div class="market-cell-val" style="color:var(--gold)">58.2%</div><div class="market-cell-sub" id="mBtcSub"></div></div>
    <div class="market-cell"><div class="market-cell-label" id="mAltLabel"></div><div class="market-cell-val" style="color:var(--blue)">35 / 100</div><div class="market-cell-sub" id="mAltSub"></div></div>
    <div class="market-cell"><div class="market-cell-label" id="mCapLabel"></div><div class="market-cell-val" style="color:var(--text)">$2.42T</div><div class="market-cell-sub" id="mCapSub"></div></div>
    <div class="market-cell"><div class="market-cell-label" id="mAlertsLabel2"></div><div class="market-cell-val" style="color:var(--orange)">20 / 48</div><div class="market-cell-sub" id="mAlertsSub"></div></div>
  </div>

  <div class="section-label" id="controlsTitle"></div>
  <div class="controls-panel">
    <div class="controls-grid">
      <div class="control-item">
        <label id="wGrowthLabel"></label>
        <div class="weight-val w-growth" id="wGrowth">30%</div>
        <input type="range" class="r-growth" min="0" max="100" value="30" id="sliderGrowth" oninput="recompute()">
        <div class="weight-desc" id="wGrowthDesc"></div>
      </div>
      <div class="control-item">
        <label id="wCommunityLabel"></label>
        <div class="weight-val w-community" id="wCommunity">30%</div>
        <input type="range" class="r-community" min="0" max="100" value="30" id="sliderCommunity" oninput="recompute()">
        <div class="weight-desc" id="wCommunityDesc"></div>
      </div>
      <div class="control-item">
        <label id="wSentimentLabel"></label>
        <div class="weight-val w-sentiment" id="wSentiment">25%</div>
        <input type="range" class="r-sentiment" min="0" max="100" value="25" id="sliderSentiment" oninput="recompute()">
        <div class="weight-desc" id="wSentimentDesc"></div>
      </div>
      <div class="control-item">
        <label id="wAthLabel"></label>
        <div class="weight-val w-ath" id="wAth">15%</div>
        <input type="range" class="r-ath" min="0" max="100" value="15" id="sliderAth" oninput="recompute()">
        <div class="weight-desc" id="wAthDesc"></div>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function rsiColor(r){if(r<30)return 'var(--green)';if(r<45)return 'var(--amber)';if(r<70)return 'var(--blue)';return 'var(--red)';}
function fmtP(n){
  if(!n)return '—';
  if(n>=1000)return '$'+n.toLocaleString('fr-FR',{maximumFractionDigits:0});
  if(n>=1)return '$'+n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:4});
  return '$'+n.toLocaleString('fr-FR',{minimumFractionDigits:4,maximumFractionDigits:8});
}
function fmtM(m){if(m>=1000)return '$'+(m/1000).toFixed(1)+'T';if(m>=1)return '$'+m.toFixed(2)+'B';return '$'+(m*1000).toFixed(0)+'M';}
function sentBadge(s){
  if(s>0.3)return['🟢',t('sent_pos'),'var(--green)'];
  if(s>0)return['🟡',t('sent_neutpos'),'var(--amber)'];
  if(s>-0.3)return['🟡',t('sent_neutneg'),'var(--text-dim)'];
  return['🔴',t('sent_neg'),'var(--red)'];
}
function trendArrow(tr){return tr===1?['↑','var(--green)']:tr===-1?['↓','var(--red)']:['→','var(--text-dim)'];}
function getTags(c, s){
  const tags=[];
  const d=Math.abs(c.ath_pct);
  if(d>90)tags.push(['tag-tech',t('tag_deep_oversold')]);
  else if(d>70)tags.push(['tag-bull',t('tag_deep_value')]);
  else if(d>50)tags.push(['tag-bull',t('tag_rebond')]);
  if(c.max_s>0)tags.push(['tag-rare',t('tag_rare')]);
  if(c.comm_grow>70)tags.push(['tag-social',t('tag_comm')]);
  if(c.c7>15)tags.push(['tag-bull',t('tag_momentum')]);
  if(c.sent_raw>0.4)tags.push(['tag-social',t('tag_sent')]);
  if(c.rsi<32)tags.push(['tag-tech',t('tag_rsi')]);
  return tags.slice(0,3);
}

// ── RECOMPUTE ─────────────────────────────────────────────────────────────────
function recompute(){
  const g=+document.getElementById('sliderGrowth').value;
  const c=+document.getElementById('sliderCommunity').value;
  const s=+document.getElementById('sliderSentiment').value;
  const a=+document.getElementById('sliderAth').value;
  const tot=g+c+s+a||1;
  weights={growth:Math.round(g/tot*100),community:Math.round(c/tot*100),sentiment:Math.round(s/tot*100),ath:Math.round(a/tot*100)};
  document.getElementById('wGrowth').textContent=weights.growth+'%';
  document.getElementById('wCommunity').textContent=weights.community+'%';
  document.getElementById('wSentiment').textContent=weights.sentiment+'%';
  document.getElementById('wAth').textContent=weights.ath+'%';
  renderAll();
}

function getRecomputed(){
  return [...COINS].map(c=>({...c,total:Math.round((c.scores.growth*weights.growth+c.scores.community*weights.community+c.scores.sentiment*weights.sentiment+c.scores.ath*weights.ath)/100)})).sort((a,b)=>b.total-a.total);
}

function renderAll(){
  const rc=getRecomputed();
  renderTop5(rc);
  renderTable(rc);
  saveToday(rc);
}

    const [ta,tc]=trendArrow(c.sent_trend);
    const alert_cell=c.accel?'<span class="alert-mini">🚨</span>':'';
    return `<tr class="${c.accel?'tr-alert':''}">
      <td class="td-rank ${isTop?'td-top':''}">${alert_cell}${isTop?'★ ':''}${c.rank}</td>
      <td><div class="td-coin"><div class="td-icon">${c.sym.substring(0,2)}</div><div><div class="td-name">${c.name}</div><div class="td-sym">${c.sym}</div></div></div></td>
      <td>${fmtP(c.price)}</td>
      <td><span class="${c.c24>=0?'pos':'neg'}">${c.c24>=0?'+':''}${c.c24.toFixed(2)}%</span></td>
      <td>${fmtM(c.mc)}</td>
      <td><span class="${Math.abs(c.ath_pct)>70?'pos':''}">${c.ath_pct.toFixed(0)}%</span></td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="mini-bar"><div class="mini-fill" style="width:${s.growth}%;background:var(--green)"></div></div><span style="font-size:11px">${s.growth}</span></div></td>
      <td><div style="display:flex;align-items:center;gap:6px"><div class="mini-bar"><div class="mini-fill" style="width:${c.comm_grow}%;background:var(--blue)"></div></div><span style="font-size:11px;color:var(--blue)">+${c.comm_grow}%</span></div></td>
      <td><span style="color:${sc};font-size:10px">${si} ${sl}</span> <span style="color:${tc};font-size:10px">${ta}</span></td>
      <td><div style="display:flex;align-items:center;gap:5px"><div class="rsi-gauge"><div class="rsi-fill" style="width:${c.rsi}%;background:${rc}"></div></div><span style="font-size:10px;color:${rc}">${c.rsi.toFixed(0)}</span></div></td>
      <td><span class="score-badge">${tot}</span></td>
    </tr>`;
  }).join('');
}

function filterTable(f){
  activeFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  const ids={all:'f-all',alert:'f-alert','sentiment+':'f-sent','community+':'f-comm'};
  document.getElementById(ids[f])?.classList.add('active');
  renderTable(getRecomputed());
}

function sortBy(key){
  if(sortKey===key)sortDir*=-1;else{sortKey=key;sortDir=-1;}
  document.querySelectorAll('#tableHead th').forEach(t=>t.classList.remove('sort-active','sort-asc','sort-desc'));
  const th=document.querySelector(`#tableHead th[data-key="${key}"]`);
  if(th){th.classList.add('sort-active',sortDir===-1?'sort-desc':'sort-asc');}
  const getV=(c,k)=>{
    const m={rank:'rank',price:'price',c24:'c24',mc:'mc',ath_pct:'ath_pct',
      growthScore:'scores.growth',comm_grow:'comm_grow',sentiment:'scores.sentiment',tech:'scores.tech',total:'total'};
    const kk=m[k]||k;
    if(kk.startsWith('scores.'))return c.scores[kk.split('.')[1]];
    if(kk==='ath_pct')return Math.abs(c.ath_pct);
    return c[kk];
  };
  const sorted=[...COINS].map(c=>({...c,total:Math.round((c.scores.growth*weights.growth+c.scores.community*weights.community+c.scores.sentiment*weights.sentiment+c.scores.ath*weights.ath)/100)})).sort((a,b)=>sortDir*(getV(b,key)-getV(a,key)));
  renderTable(sorted);
}

// ── TRACK RECORD ─────────────────────────────────────────────────────────────
function switchTrTab(tab){
  activeTrTab=tab;
  document.querySelectorAll('.tr-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('trTab'+tab.replace('d','')+'d')?.classList.add('active');
  document.querySelectorAll('.tr-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('trPanel'+tab)?.classList.add('active');
}

function renderTrackRecord(){
  // Check localStorage for user-generated history
  let userHistory = [];
  try {
    const stored = localStorage.getItem('oracle_history');
    if(stored) userHistory = JSON.parse(stored);
  } catch(e){}

  // Build panels for each period using HISTORY data + any localStorage data
  const panelMap = {'7d':'trPanel7d','14d':'trPanel14d','30d':'trPanel30d'};
  
  HISTORY.snapshots.forEach(snap => {
    const panelId = panelMap[snap.period];
    const panel = document.getElementById(panelId);
    if(!panel) return;

    const label = snap['label_'+lang] || snap.label_fr;
    const avgPricePerf = snap.avg_price_perf;
    const avgMcPerf = snap.avg_mc_perf;
    const winRate = snap.win_rate;

    let html = `
    <div class="tr-summary-bar">
      <div class="tr-summary-cell">
        <div class="tr-summary-val ${avgPricePerf>=0?'perf-pos':'perf-neg'}">${avgPricePerf>=0?'+':''}${avgPricePerf}%</div>
        <div class="tr-summary-label">${t('tr_avg_return')} (${t('tr_price_perf')})</div>
      </div>
      <div class="tr-summary-cell">
        <div class="tr-summary-val ${avgMcPerf>=0?'perf-pos':'perf-neg'}">${avgMcPerf>=0?'+':''}${avgMcPerf}%</div>
        <div class="tr-summary-label">${t('tr_avg_return')} (${t('tr_mc_perf')})</div>
      </div>
      <div class="tr-summary-cell">
        <div class="tr-summary-val" style="color:var(--gold)">${winRate}/5</div>
        <div class="tr-summary-label">${t('tr_win_rate')}</div>
      </div>
    </div>
    <div class="tr-storage-info">${t('tr_reco_date')}: <strong>${snap.date}</strong> — ${label} · ${t('tr_storage_info')}</div>
    <div class="tr-coin-row" style="background:rgba(255,255,255,0.02)">
      <div class="tr-col-header">${t('th_asset')}</div>
      <div class="tr-col-header">${t('tr_rank_then')} → ${t('tr_rank_now')}</div>
      <div class="tr-col-header">${t('tr_price_perf')}</div>
      <div class="tr-col-header">${t('tr_mc_perf')}</div>
      <div class="tr-col-header">${t('tr_score_title')}</div>
    </div>`;

    snap.top5.forEach(c => {
      const pp = c.price_perf, mp = c.mc_perf, rc = c.rank_change;
      const rankDir = rc > 0 ? `<span style="color:var(--green)">↑${rc}</span>` : rc < 0 ? `<span style="color:var(--red)">↓${Math.abs(rc)}</span>` : '<span style="color:var(--text-dim)">—</span>';
      const ppBar = Math.min(100, Math.abs(pp));
      const ppColor = pp >= 0 ? 'var(--green)' : 'var(--red)';
      html += `
      <div class="tr-coin-row">
        <div class="tr-col">
          <div class="tr-coin-name">${c.name}</div>
          <div class="tr-coin-sym">${c.sym} · Score Oracle: ${c.score_then}</div>
        </div>
        <div class="tr-col">
          <div class="tr-rank-change">
            <span style="color:var(--text-dim)">#${c.rank_then}</span>
            <span style="color:var(--text-dim)">→</span>
            <span style="color:var(--text)">#${c.rank_now}</span>
            ${rankDir}
          </div>
        </div>
        <div class="tr-col">
          <div class="perf-bar-wrap">
            <div class="perf-bar"><div class="perf-bar-fill" style="width:${ppBar}%;background:${ppColor}"></div></div>
            <span class="${pp>=0?'perf-pos':'perf-neg'}">${pp>=0?'+':''}${pp}%</span>
          </div>
          <div style="font-size:10px;color:var(--text-dim);margin-top:3px">${fmtP(c.price_then)} → ${fmtP(c.price_now)}</div>
        </div>
        <div class="tr-col">
          <span class="${mp>=0?'perf-pos':'perf-neg'}">${mp>=0?'+':''}${mp}%</span>
          <div style="font-size:10px;color:var(--text-dim);margin-top:3px">${fmtM(c.mc_then)} → ${fmtM(c.mc_now)}</div>
        </div>
        <div class="tr-col">
          <span style="font-family:'Orbitron',sans-serif;font-size:14px;color:var(--orange)">${c.score_then}</span>
          <div style="font-size:9px;color:var(--text-dim);margin-top:2px">/ 100</div>
        </div>
      </div>`;
    });
    panel.innerHTML = html;
  });

  // Update global perf
  const allPerfs = HISTORY.snapshots.flatMap(s=>s.top5.map(c=>c.price_perf));
  const globalAvg = (allPerfs.reduce((a,b)=>a+b,0)/allPerfs.length).toFixed(1);
  document.getElementById('trGlobalVal').textContent = (globalAvg>=0?'+':'')+globalAvg+'%';
}

// ── LOCALSTORAGE: save today's top5 ──────────────────────────────────────────
function saveToday(coins) {
  try {
    const today = new Date().toISOString().split('T')[0];
    let history = [];
    const stored = localStorage.getItem('oracle_history');
    if(stored) history = JSON.parse(stored);
    // Only save once per day
    const alreadySaved = history.find(h=>h.date===today);
    if(!alreadySaved) {
      const top5 = coins.slice(0,5).map(c=>({
        sym:c.sym, name:c.name, rank:c.rank, score:c.total,
        price:c.price, mc:c.mc, date:today
      }));
      history.push({date:today, top5});
      // Keep last 35 days
      if(history.length>35) history=history.slice(-35);
      localStorage.setItem('oracle_history', JSON.stringify(history));
    }
  } catch(e){}
}
